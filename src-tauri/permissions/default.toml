[[permission]]
identifier = "allow-cmd-retry-startup"
description = "Allow retrying startup after a failed embedded pi launch (used by the bootstrap error window)"
commands.allow = ["cmd_retry_startup"]

# Permission set that bundles all custom command permissions.
# Referenced from capabilities/default.json as "pi-desktop:default".
[default]
description = "Default permissions bundle for Pi Desktop custom commands"
permissions = [
  "allow-cmd-retry-startup",
]
